    .signup-row button:hover:not(:disabled) { background: var(--red); }

<body>
  <img class="wordmark" src="https://dev.nodice.bar/nodice-wordmark.png" alt="No Dice">

  <form class="signup" id="signup-form">
    <div class="signup-label">Get the opening night details</div>
    <div class="signup-row">
      <input type="email" id="email" name="email" placeholder="you@email.com" required autocomplete="email">
      <button type="submit" id="submit-btn">Notify me</button>
    </div>
    <div class="signup-fine">One email. No spam.</div>
  </form>
  <div class="success" id="success">
    <div class="success-kicker">You're on the list</div>
    <div class="success-body">We'll let you know the moment doors open. 17 June.</div>
  </div>
  <script>
    const FN_URL = 'https://rntcujcpsozvuxvmlejv.supabase.co/functions/v1/send-welcome-discount';
    const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJudGN1amNwc296dnV4dm1sZWp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0Nzk0MDIsImV4cCI6MjA5NjA1NTQwMn0.cUMy2GWme7quwDKns_sXq8OY-9SqWaIuZqhYSz3ZwrY';
    const form = document.getElementById('signup-form');
    const success = document.getElementById('success');
    const btn = document.getElementById('submit-btn');
    const emailInput = document.getElementById('email');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      if (!email) return;
      btn.disabled = true;
      btn.textContent = 'Sending…';
      try { await fetch(FN_URL, { method: 'POST', headers: { 'Content-Type': 'application/json', 'apikey': ANON, 'Authorization': 'Bearer ' + ANON }, body: JSON.stringify({ email: email, source: 'splash' }) }); } catch (_) {}
      form.classList.add('hidden');
      success.classList.add('show');
    });
  </script>
